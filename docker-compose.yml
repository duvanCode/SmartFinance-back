services:
  # ===========================================
  # Production API Service (SmartFinance)
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - PORT=${PORT:-3000}
    container_name: smartfinance-api
    restart: unless-stopped
    
    # Exponemos el puerto solo internamente para Traefik/Dokploy
    expose:
      - "${PORT:-3000}"
    
    # Si necesitas acceso directo sin pasar por Traefik, descomenta 'ports'
    # ports:
    #   - "${PORT:-3000}:${PORT:-3000}"

    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      # Estas variables deben venir de tu panel de Dokploy o archivo .env
      - DB_HOST=${DB_HOST} 
      - DB_PORT=${DB_PORT:-5432}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GROQ_WHISPER_MODEL=${GROQ_WHISPER_MODEL:-whisper-large-v3-turbo}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - DEEPGRAM_VOICE=${DEEPGRAM_VOICE:-aura-2-celeste-es}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - THROTTLE_TTL=${THROTTLE_TTL:-60000}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-100}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-false}

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${PORT:-3000}/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - dokploy-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Red externa de Dokploy para que Traefik gestione el SSL y el tráfico
  dokploy-network:
    external: true
